<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Визитка lolotol89 — все контакты">
    <title>lolotol • Dynamic Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/lolotol/sait/main/photo.jpg">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/lolotol/sait/main/photo.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap');
        
        * {
            cursor: none !important;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            user-select: none;
            background: linear-gradient(135deg, #1a0a1f 0%, #2e1a2a 50%, #3a1a2e 100%);
            position: relative;
            min-height: 100vh;
            padding: 20px;
        }
        
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .card {
            background: rgba(20, 10, 25, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 105, 180, 0.25);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
            border-radius: 2rem;
        }
        
        .neon-name {
            text-shadow: 0 0 5px #FF69B4, 0 0 10px #FF69B4, 0 0 20px #FF69B4, 0 0 40px #FF1493;
            animation: neon-pulse 1.5s ease-in-out infinite alternate;
        }
        
        @keyframes neon-pulse {
            from { text-shadow: 0 0 5px #FF69B4, 0 0 10px #FF69B4, 0 0 20px #FF69B4; }
            to { text-shadow: 0 0 10px #FF69B4, 0 0 20px #FF69B4, 0 0 40px #FF1493, 0 0 60px #FF69B4; }
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(26, 10, 31, 0.8); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #FF69B4, #FF1493); border-radius: 10px; }
        
        .avatar-container {
            width: 112px; height: 112px; border-radius: 1.5rem; overflow: hidden;
            background: linear-gradient(145deg, #FF69B4, #FF1493);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(255,105,180,0.6);
            cursor: pointer;
        }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-placeholder {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #FF69B4, #FF1493);
            animation: heartbeat 1.5s ease-in-out infinite;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .avatar-placeholder i { font-size: 3.5rem; color: white; }
        .avatar-glow { animation: glow-pink 2s ease-in-out infinite alternate; }
        @keyframes glow-pink {
            from { box-shadow: 0 0 20px -5px #FF69B4; }
            to { box-shadow: 0 0 45px 20px #FF69B4; }
        }
        
        .online-badge {
            position: absolute; bottom: -5px; right: -8px; background: #FF69B4;
            font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 20px;
            display: flex; align-items: center; gap: 5px; backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .status-dot { width: 8px; height: 8px; background-color: #22c55e; border-radius: 50%; animation: pulse-green 1.2s infinite; }
        @keyframes pulse-green { 0% { opacity: 0.5; transform: scale(0.8);} 100% { opacity: 1; transform: scale(1.2);} }
        
        #msk-time {
            font-family: 'Space Grotesk', monospace;
            background: linear-gradient(to right, #FFB8CC, #FF69B4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
            font-size: 1.25rem;
        }
        
        /* Яркие кнопки Telegram */
        .tg-button {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 105, 180, 0.4);
            border-radius: 1.5rem;
        }
        .tg-button:hover {
            transform: translateY(-3px);
            background: rgba(255, 105, 180, 0.25);
            border-color: #FF69B4;
            box-shadow: 0 15px 25px -8px rgba(255, 105, 180, 0.4);
        }
        .tg-button span {
            color: #FFB8CC;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .tg-button:hover span { 
            color: #FFD0E0; 
        }
        .social-icon-bg {
            background: linear-gradient(135deg, #FF69B4, #FF1493);
            border-radius: 1rem;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(255,105,180,0.3);
        }
        .tg-button:hover .social-icon-bg {
            box-shadow: 0 0 20px rgba(255,105,180,0.8);
            transform: scale(1.05);
        }
        .social-icon-bg i {
            color: white !important;
            text-shadow: 0 0 4px rgba(0,0,0,0.2);
        }
        
        /* Плеер */
        .player-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 105, 180, 0.3);
            border-radius: 1.5rem;
            transition: all 0.3s;
        }
        .player-card:hover {
            border-color: #FF69B4;
            box-shadow: 0 0 20px rgba(255,105,180,0.2);
        }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%;
            background: #FF69B4; box-shadow: 0 0 10px #FF69B4; margin-top: -4px;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; background: rgba(255, 105, 180, 0.3); border-radius: 2px;
        }
        .play-btn-wrapper:hover { transform: scale(1.05); }
        .play-btn-wrapper:active { transform: scale(0.95); }
        .time-display {
            font-size: 11px;
            font-family: monospace;
            color: #FFB8CC;
        }
        
        /* Tab кнопки */
        .tab-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,105,180,0.3);
            transition: all 0.2s;
            color: #FFB8CC;
            cursor: pointer;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #FF69B4, #FF1493);
            border-color: #FF69B4;
            color: white;
            box-shadow: 0 0 15px rgba(255,105,180,0.5);
        }
        .tab-btn:hover:not(.active) {
            border-color: #FF69B4;
            transform: translateY(-2px);
        }
        
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .repo-item, .game-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,105,180,0.2);
            transition: all 0.2s;
        }
        .repo-item:hover, .game-item:hover {
            border-color: #FF69B4;
            transform: translateX(5px);
        }
        
        .lang-switch {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,105,180,0.4); border-radius: 40px;
            padding: 8px 16px; display: flex; gap: 8px;
            transition: all 0.3s; opacity: 0; transform: translateY(-10px);
        }
        .lang-switch.visible { opacity: 1; transform: translateY(0); }
        .lang-option { font-weight: 600; padding: 4px 12px; border-radius: 30px; font-size: 14px; color: rgba(255,255,255,0.7); cursor: pointer; }
        .lang-option.active { background: #FF69B4; color: white; }
        
        #custom-cursor {
            position: fixed; width: 32px; height: 32px; pointer-events: none; z-index: 99999;
            transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center;
        }
        #custom-cursor .cursor-inner {
            width: 32px; height: 32px; background: #FF69B4; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px 6px #FF69B4;
            animation: cursor-pulse 1.2s ease-in-out infinite;
        }
        @keyframes cursor-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.25); }
        }
        @media (pointer: coarse) { #custom-cursor { display: none !important; } * { cursor: auto !important; } }
        
        .toast-notification {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); color: #FF69B4;
            padding: 10px 20px; border-radius: 50px; z-index: 10000;
            transition: transform 0.3s ease; border: 1px solid #FF69B4;
        }
        .toast-notification.show { transform: translateX(-50%) translateY(0); }
        
        #intro-screen {
            position: fixed; inset: 0; z-index: 100000; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #1a0a1f 0%, #3a1a2e 100%);
        }
        .intro-content { animation: intro-pop 2.2s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards; }
        @keyframes intro-pop {
            0% { opacity: 0; transform: scale(0.4) translateY(40px); }
            40% { opacity: 1; transform: scale(1.15) translateY(-10px); }
            70% { transform: scale(0.95) translateY(5px); }
            100% { transform: scale(1) translateY(0); }
        }
        .main-content {
            opacity: 0; transform: scale(0.92); transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative; z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Адаптив */
        @media (max-width: 1024px) {
            .flex-container {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }
            .right-column {
                order: 1;
            }
            .center-column {
                order: 2;
            }
        }
        
        @media (min-width: 1025px) {
            .flex-container {
                display: flex;
                flex-direction: row;
                gap: 1.5rem;
            }
            .right-column {
                width: 33.333%;
                order: 1;
            }
            .center-column {
                width: 66.666%;
                order: 2;
            }
        }
        
        .scanline { position: relative; }
        .scanline::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(255, 105, 180, 0.1) 50%);
            background-size: 100% 6px; pointer-events: none;
            animation: scan 8s linear infinite; opacity: 0.2; border-radius: inherit;
        }
        @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
    </style>
</head>
<body>
    
    <canvas id="particles-canvas"></canvas>
    
    <div class="lang-switch" id="langSwitch">
        <div class="lang-option active" data-lang="ru">РУ</div>
        <div class="lang-option" data-lang="en">EN</div>
    </div>
    
    <div id="custom-cursor"><div class="cursor-inner"><span>•</span></div></div>

    <div id="intro-screen">
        <div class="intro-content text-center">
            <div class="mx-auto w-40 h-40 rounded-3xl overflow-hidden mb-4 shadow-2xl avatar-glow border-4 border-[#FF69B4]/50">
                <img src="https://raw.githubusercontent.com/lolotol/sait/main/photo.jpg" alt="intro" class="w-full h-full object-cover">
            </div>
            <div class="text-[#FFB8CC] font-bold tracking-[0.2em] uppercase text-sm mb-6 animate-pulse">ЗАГРУЗКА...</div>
            <h1 class="title-font text-7xl font-semibold text-white mb-3">lolotol</h1>
            <p class="text-pink-200 text-2xl">@lolotol89</p>
            <div class="mt-12 flex gap-2 justify-center">
                <div class="w-4 h-4 bg-[#FF69B4] rounded-full animate-bounce"></div>
                <div class="w-4 h-4 bg-[#FF69B4] rounded-full animate-bounce" style="animation-delay: 150ms"></div>
                <div class="w-4 h-4 bg-[#FF69B4] rounded-full animate-bounce" style="animation-delay: 300ms"></div>
            </div>
        </div>
    </div>
    
    <div id="main-content" class="main-content">
        <div class="flex-container">
            
            <!-- ПРАВАЯ КОЛОНКА (аватар, контакты, плеер) -->
            <div class="right-column">
                <div class="card p-6 md:p-8 scanline">
                    <div class="flex justify-center mb-4 relative">
                        <div class="relative">
                            <div class="avatar-container avatar-glow" id="avatarWrapper">
                                <div id="avatarPlaceholder" class="avatar-placeholder">
                                    <i class="fa-regular fa-heart text-5xl"></i>
                                </div>
                                <img id="dynamicAvatar" class="avatar-img" style="display: none;" alt="avatar">
                            </div>
                            <div class="online-badge">
                                <div class="status-dot"></div>
                                <span id="onlineText">ONLINE</span>
                            </div>
                        </div>
                    </div>
                    
                    <h1 class="title-font text-5xl font-semibold text-center text-white neon-name">lolotol</h1>
                    <div id="msk-time" class="text-center my-3">00:00:00</div>
                    
                    <!-- Кнопки Telegram и Канал (яркие, с рупором у канала) -->
                    <div class="grid grid-cols-2 gap-4 mt-4">
                        <a href="https://t.me/lolotol89" target="_blank" class="tg-button flex flex-col items-center gap-2 rounded-2xl p-4">
                            <div class="w-12 h-12 social-icon-bg rounded-xl flex items-center justify-center">
                                <i class="fa-brands fa-telegram text-2xl"></i>
                            </div>
                            <span class="font-semibold text-base" data-i18n="telegram">Telegram</span>
                        </a>
                        <a href="https://t.me/lolotol089" target="_blank" class="tg-button flex flex-col items-center gap-2 rounded-2xl p-4 relative">
                            <div class="w-12 h-12 social-icon-bg rounded-xl flex items-center justify-center relative">
                                <i class="fa-brands fa-telegram text-2xl"></i>
                                <div class="absolute -top-1 -right-1 bg-[#FF69B4] rounded-full w-5 h-5 flex items-center justify-center shadow-lg">
                                    <i class="fa-solid fa-bullhorn text-[10px] text-white"></i>
                                </div>
                            </div>
                            <span class="font-semibold text-base" data-i18n="channel">Channel</span>
                        </a>
                    </div>
                    
                    <!-- МУЗЫКАЛЬНЫЙ ПЛЕЕР -->
                    <div class="mt-6">
                        <audio id="customAudio" src="https://raw.githubusercontent.com/lolotol/Sait/main/Ado%20-%20Usseewa.mp3" preload="metadata"></audio>
                        <div class="player-card p-4">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 rounded-xl overflow-hidden flex-shrink-0">
                                    <img src="https://raw.githubusercontent.com/lolotol/Sait/main/ado-kyougen.jpg" class="w-full h-full object-cover" alt="cover">
                                </div>
                                <div class="flex-1 min-w-0">
                                    <p class="text-white font-bold text-sm truncate">Usseewa</p>
                                    <p class="text-[#FF69B4] text-xs truncate">Ado</p>
                                    <div class="time-display mt-1">
                                        <span id="currentTime">0:00</span> / <span id="durationTime">0:00</span>
                                    </div>
                                </div>
                                <button id="playPauseBtn" class="play-btn-wrapper w-12 h-12 rounded-xl bg-gradient-to-r from-[#FF69B4] to-[#FF1493] flex items-center justify-center shadow-lg transition-all">
                                    <i id="playIcon" class="fa-solid fa-play text-white text-lg ml-0.5"></i>

                            </div>
                            <div class="mt-3 relative">
                                <div class="absolute left-0 h-1 bg-[#FF69B4] rounded-full pointer-events-none" id="progressFill" style="width: 0%;"></div>
                                <input type="range" id="audioProgress" value="0" min="0" max="100" class="w-full z-10 relative">

                    <div class="text-center text-xs text-pink-300/70 mt-6">

            <!-- ЦЕНТРАЛЬНАЯ КОЛОНКА (Steam и GitHub) -->

                        <button data-tab="github" class="tab-btn flex items-center gap-2 px-5 py-3 rounded-xl font-semibold transition-all">
                            <i class="fa-brands fa-github text-xl"></i>

                    </div>
                    
                    <div class="flex-1 min-h-[400px]">
                        <div id="steam-tab" class="tab-content">

                            </div>

                                </div>
                            </div>
                        </div>
                        
                        <div id="github-tab" class="tab-content">
                            <div class="flex items-center gap-3 mb-4">
                                <i class="fa-brands fa-github text-3xl text-[#FF69B4]"></i>
                                <h3 class="text-xl font-bold text-white">Репозитории</h3>
                            </div>
                            <div id="github-repos-list" class="space-y-3">
                                <div class="text-center text-pink-300/50 py-10">
                                    <i class="fa-solid fa-spinner fa-spin text-2xl"></i>
                                    <p class="mt-2">Загрузка репозиториев...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast-notification">✨ Готово!</div>

    <script>
        // ========== КОНФИГ ==========
        const GITHUB_TOKEN = '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';
        const GITHUB_USER = 'lolotol';
        const STEAM_API_KEY = 'BA8EFA158AA99FF275C9BF08A6656093';
        const STEAM_ID = '76561199082748854';
        
        // ========== ЗАГРУЗКА STEAM ИГР ==========
        async function loadSteamGames() {
            const container = document.getElementById('steam-games-list');
            try {
                const url = `https://api.steampowered.com/IPlayerService/GetOwnedGames/v0001/?key=${STEAM_API_KEY}&steamid=${STEAM_ID}&format=json&include_appinfo=true`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.response && data.response.games) {
                    let games = data.response.games;
                    games.sort((a, b) => b.playtime_forever - a.playtime_forever);
                    const top5 = games.slice(0, 5);
                    
                    if (top5.length === 0) {
                        container.innerHTML = '<div class="text-center text-pink-300/50 py-10">🎮 Нет данных об играх</div>';
                        return;
                    }
                    
                    container.innerHTML = top5.map(game => {
                        const hours = Math.floor(game.playtime_forever / 60);
                        const minutes = game.playtime_forever % 60;
                        const timeStr = hours > 0 ? `${hours} ч ${minutes} мин` : `${minutes} мин`;
                        const imgUrl = `https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/${game.appid}/header.jpg`;
                        return `
                            <div class="game-item rounded-xl p-3 flex items-center gap-4 transition-all">
                                <img src="${imgUrl}" class="w-12 h-12 rounded-lg object-cover" onerror="this.src='https://via.placeholder.com/48x48?text=🎮'">
                                <div class="flex-1">
                                    <p class="text-white font-semibold">${game.name}</p>
                                    <p class="text-pink-300/70 text-sm">⏱️ ${timeStr}</p>
                                </div>
                                <a href="https://store.steampowered.com/app/${game.appid}" target="_blank" class="text-pink-400 hover:text-pink-300">
                                    <i class="fa-solid fa-arrow-up-right-from-m"></i>
                                </a>
                            </div>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = '<div class="text-center text-pink-300/50 py-10">🎮 Не удалось загрузить игры (профиль может быть приватным)</div>';
                }
            } catch (error) {
                console.error('Steam API error:', error);
                container.innerHTML = '<div class="text-center text-pink-300/50 py-10">⚠️ Ошибка загрузки Steam данных</div>';
            }
        }
        
        // ========== ЗАГРУЗКА GITHUB РЕПОЗИТОРИЕВ ==========
        async function loadGithubRepos() {
            const container = document.getElementById('github-repos-list');
            try {
                const response = await fetch(`https://api.github.com/users/${GITHUB_USER}/repos?sort=updated&per_page=5`, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                const repos = await response.json();
                
                if (Array.isArray(repos) && repos.length > 0) {
                    container.innerHTML = repos.map(repo => `
                        <div class="repo-item rounded-xl p-4 transition-all">
                            <div class="flex items-center justify-between">
                                <div class="flex-1">
                                    <a href="${repo.html_url}" target="_blank" class="text-[#FF69B4] font-bold hover:underline flex items-center gap-2">
                                        <i class="fa-regular fa-folder-open"></i> ${repo.name}
                                    </a>
                                    <p class="text-gray-400 text-sm mt-1">${repo.description || 'Нет описания'}</p>
                                    <div class="flex gap-4 mt-2 text-xs text-pink-300/50">
                                        <span><i class="fa-regular fa-star"></i> ${repo.stargazers_count}</span>
                                        <span><i class="fa-solid fa-code-fork"></i> ${repo.forks_count}</span>
                                        <span><i class="fa-regular fa-circle-dot"></i> ${repo.language || 'N/A'}</span>
                                    </div>
                                </div>
                                <i class="fa-solid fa-arrow-up-right-from-m text-pink-400/50"></i>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="text-center text-pink-300/50 py-10">📂 Нет публичных репозиториев</div>';
                }
            } catch (error) {
                console.error('GitHub API error:', error);
                container.innerHTML = '<div class="text-center text-pink-300/50 py-10">⚠️ Ошибка загрузки GitHub репозиториев</div>';
            }
        }
        
        // ========== ТАБЫ ==========
        function initTabs() {
            const tabs = document.querySelectorAll('[data-tab]');
            const contents = {
                steam: document.getElementById('steam-tab'),
                github: document.getElementById('github-tab')
            };
            
            function activateTab(tabId) {
                Object.keys(contents).forEach(id => {
                    contents[id].classList.remove('active');
                });
                tabs.forEach(btn => {
                    if (btn.getAttribute('data-tab') === tabId) {
                        btn.classList.add('active');
                    } else if (btn.getAttribute('data-tab')) {
                        btn.classList.remove('active');
                    }
                });
                if (contents[tabId]) {
                    contents[tabId].classList.add('active');
                }
            }
            
            tabs.forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabId = btn.getAttribute('data-tab');
                    if (tabId) {
                        activateTab(tabId);
                        if (tabId === 'steam' && !window.steamLoaded) {
                            loadSteamGames();
                            window.steamLoaded = true;
                        }
                        if (tabId === 'github' && !window.githubLoaded) {
                            loadGithubRepos();
                            window.githubLoaded = true;
                        }
                    }
                });
            });
            
            activateTab('steam');
            loadSteamGames();
            window.steamLoaded = true;
        }
        
        // ========== ПЛЕЕР ==========
        const audio = document.getElementById('customAudio');
        const playBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const progress = document.getElementById('audioProgress');
        const progressFill = document.getElementById('progressFill');
        const currentTimeSpan = document.getElementById('currentTime');
        const durationTimeSpan = document.getElementById('durationTime');
        const STORAGE_KEY = 'audioPlayerState';
        
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function savePlayerState() {
            if (audio.duration && !isNaN(audio.duration)) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    currentTime: audio.currentTime,
                    wasPlaying: !audio.paused,
                    timestamp: Date.now()
                }));
            }
        }
        
        function loadPlayerState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const state = JSON.parse(saved);
                    if (state.timestamp && Date.now() - state.timestamp < 24 * 60 * 60 * 1000) {
                        if (state.currentTime) audio.currentTime = state.currentTime;
                        if (state.wasPlaying) setTimeout(() => audio.play().catch(e => {}), 500);
                    }
                } catch(e) {}
            }
        }
        
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playIcon.classList.replace('fa-play', 'fa-pause');
                playIcon.classList.remove('ml-0.5');
            } else {
                audio.pause();
                playIcon.classList.replace('fa-pause', 'fa-play');
                playIcon.classList.add('ml-0.5');
            }
            savePlayerState();
        });
        
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progress.value = percent;
                progressFill.style.width = `${percent}%`;
                currentTimeSpan.textContent = formatTime(audio.currentTime);
            }
        });
        
        audio.addEventListener('loadedmetadata', () => {
            durationTimeSpan.textContent = formatTime(audio.duration);
            loadPlayerState();
        });
        
        progress.addEventListener('input', (e) => {
            const percent = e.target.value;
            if (audio.duration) {
                audio.currentTime = (percent / 100) * audio.duration;
                progressFill.style.width = `${percent}%`;
                savePlayerState();
            }
        });
        
        audio.addEventListener('ended', () => {
            playIcon.classList.replace('fa-pause', 'fa-play');
            playIcon.classList.add('ml-0.5');
            progress.value = 0;
            progressFill.style.width = '0%';
            currentTimeSpan.textContent = '0:00';
            savePlayerState();
        });
        
        // ========== ОСТАЛЬНЫЕ ФУНКЦИИ ==========
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
        
        const AVATAR_URL = 'https://raw.githubusercontent.com/lolotol/sait/main/photo.jpg';
        const avatarImg = document.getElementById('dynamicAvatar');
        const avatarPlaceholder = document.getElementById('avatarPlaceholder');
        let clickCount = 0;
        
        function launchConfetti() {
            for (let i = 0; i < 90; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.style.position = 'fixed'; c.style.zIndex = '9999';
                    c.style.left = Math.random() * 100 + 'vw'; c.style.top = '-20px';
                    c.style.fontSize = '22px'; c.style.pointerEvents = 'none';
                    c.textContent = ['🩷', '💖', '🌸', '🦩', '✨', '💗', '🎀'][Math.floor(Math.random() * 7)];
                    document.body.appendChild(c);
                    const d = Math.random() * 3200 + 2200;
                    c.animate([
                        { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
                        { transform: `translateY(${window.innerHeight + 120}px) rotate(${Math.random()*900}deg)`, opacity: 0 }
                    ], { duration: d });
                    setTimeout(() => c.remove(), d);
                }, Math.random() * 700);
            }
        }
        
        function loadAvatar() {
            const img = new Image();
            img.onload = () => {
                avatarImg.src = img.src;
                avatarImg.style.display = 'block';
                avatarPlaceholder.style.display = 'none';
            };
            img.onerror = () => {
                avatarImg.style.display = 'none';
                avatarPlaceholder.style.display = 'flex';
            };
            img.src = `${AVATAR_URL}?t=${Date.now()}`;
        }
        
        document.querySelector('.avatar-container')?.addEventListener('click', () => {
            clickCount++;
            setTimeout(() => { clickCount = 0; }, 1000);
            if (clickCount >= 5) {
                launchConfetti();
                showToast('✨ СЕКРЕТНЫЙ КОНФЕТТИ! ✨');
                clickCount = 0;
            }
        });
        
        function updateTime() {
            const now = new Date();
            const options = { timeZone: 'Europe/Moscow', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('msk-time').textContent = new Intl.DateTimeFormat('ru-RU', options).format(now);
        }
        
        const translations = {
            ru: { telegram: "Telegram", channel: "Канал", online: "ОНЛАЙН", footerHashtags: "#проститутка #шлюха #секс #эскорт" },
            en: { telegram: "Telegram", channel: "Channel", online: "ONLINE", footerHashtags: "#prostitute #slut #sex #escort" }
        };
        let currentLang = 'ru';
        
        function updateLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });
            document.getElementById('onlineText').textContent = t.online;
            document.getElementById('footerHashtags').textContent = t.footerHashtags;
            document.querySelectorAll('.lang-option').forEach(opt => {
                if (opt.dataset.lang === lang) opt.classList.add('active');
                else opt.classList.remove('active');
            });
            localStorage.setItem('preferredLang', lang);
        }
        
        function initLanguage() {
            const saved = localStorage.getItem('preferredLang');
            if (saved === 'ru' || saved === 'en') currentLang = saved;
            else currentLang = navigator.language.startsWith('en') ? 'en' : 'ru';
            updateLanguage(currentLang);
            document.querySelectorAll('.lang-option').forEach(opt => {
                opt.addEventListener('click', () => updateLanguage(opt.dataset.lang));
            });
        }
        
        const cursor = document.getElementById('custom-cursor');
        if (!('ontouchstart' in window)) {
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
        } else { cursor.style.display = 'none'; }
        
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('copy', e => e.preventDefault());
        
        const canvasEl = document.getElementById('particles-canvas');
        const ctxC = canvasEl.getContext('2d');
        let particles = [];
        function resizeCanvas() {
            canvasEl.width = window.innerWidth;
            canvasEl.height = window.innerHeight;
        }
        function createParticles() {
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvasEl.width,
                    y: Math.random() * canvasEl.height,
                    radius: Math.random() * 3 + 1,
                    speedY: Math.random() * 0.5 + 0.2,
                    color: `rgba(255, ${105 + Math.random() * 50}, ${180 + Math.random() * 50}, ${Math.random() * 0.4 + 0.2})`
                });
            }
        }
        function animateParticles() {
            ctxC.clearRect(0, 0, canvasEl.width, canvasEl.height);
            for (let p of particles) {
                p.y -= p.speedY;
                if (p.y < -10) { p.y = canvasEl.height + 10; p.x = Math.random() * canvasEl.width; }
                ctxC.beginPath();
                ctxC.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctxC.fillStyle = p.color;
                ctxC.fill();
            }
            requestAnimationFrame(animateParticles);
        }
        function initParticles() {
            resizeCanvas();
            createParticles();
            animateParticles();
            window.addEventListener('resize', () => { resizeCanvas(); createParticles(); });
        }
        
        window.onload = () => {
            initLanguage();
            initParticles();
            initTabs();
            loadAvatar();
            
            setTimeout(() => {
                const intro = document.getElementById('intro-screen');
                const main = document.getElementById('main-content');
                intro.style.transition = 'opacity 1s';
                intro.style.opacity = '0';
                setTimeout(() => {
                    intro.style.display = 'none';
                    main.style.opacity = '1';
                    main.style.transform = 'scale(1)';
                    document.getElementById('langSwitch').classList.add('visible');
                    if (!localStorage.getItem('confettiLaunched')) {
                        launchConfetti();
                        localStorage.setItem('confettiLaunched', 'true');
                    }
                }, 1000);
            }, 2500);
        };
        
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
